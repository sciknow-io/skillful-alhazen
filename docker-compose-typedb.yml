# Docker Compose for TypeDB server (schema testing and development)
# Usage: docker compose -f docker-compose-typedb.yml up -d

services:
  typedb:
    image: typedb/typedb:3.8.0
    container_name: alhazen-typedb
    ports:
      - "127.0.0.1:1729:1729"
    volumes:
      - typedb-data:/var/lib/typedb/data
      - ./local_resources/typedb:/schema:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'echo > /dev/tcp/localhost/1729' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  typedb-data:
    driver: local
