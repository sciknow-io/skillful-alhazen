# Docker Compose for full TypeDB + MCP Server stack
# Usage: docker compose -f docker-compose-typedb-mcp.yml up -d
#
# This provides:
# - TypeDB server for knowledge graph storage
# - MCP server exposing TypeDB operations to Claude/agents
#
# After starting, configure your Claude Code or agent to connect to
# the MCP server at localhost:3000

services:
  typedb:
    image: typedb/typedb:3.8.0
    container_name: alhazen-typedb
    ports:
      - "127.0.0.1:1729:1729"
    volumes:
      - typedb-data:/var/lib/typedb/data
      - ./local_resources/typedb:/schema:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'echo > /dev/tcp/localhost/1729' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - alhazen-network

  typedb-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: alhazen-mcp
    depends_on:
      typedb:
        condition: service_healthy
    environment:
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - TYPEDB_DATABASE=alhazen_notebook
      - MCP_PORT=3000
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - alhazen-network
    command: python -m skillful_alhazen.mcp.typedb_server

  # Schema loader - runs once to initialize the database
  typedb-init:
    image: python:3.11-slim
    container_name: alhazen-typedb-init
    depends_on:
      typedb:
        condition: service_healthy
    volumes:
      - ./local_resources/typedb:/schema:ro
      - ./scripts:/scripts:ro
    networks:
      - alhazen-network
    environment:
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - TYPEDB_DATABASE=alhazen_notebook
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install typedb-driver -q
        python /scripts/db_init.py \
          /schema/alhazen_notebook.tql \
          /schema/namespaces/scilit.tql \
          /schema/namespaces/jobhunt.tql \
          /schema/namespaces/apm.tql \
          /schema/namespaces/techrecon.tql
    restart: "no"

volumes:
  typedb-data:
    driver: local

networks:
  alhazen-network:
    driver: bridge
