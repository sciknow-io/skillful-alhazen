# Docker Compose for Skillful-Alhazen
# Usage: docker compose up -d
#
# Services:
# - Hub: http://localhost:8080 (master landing page)
# - Job Hunt Dashboard: http://localhost:3001
# - TypeDB: localhost:1729
#
# To run only TypeDB: docker compose up -d typedb
# To run everything: docker compose up -d

services:
  # ============================================
  # TypeDB - Knowledge Graph Database
  # ============================================
  typedb:
    image: typedb/typedb:3.8.0
    container_name: alhazen-typedb
    ports:
      - "127.0.0.1:1729:1729"
    volumes:
      - typedb-data:/var/lib/typedb/data
      - ./local_resources/typedb:/schema:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'echo > /dev/tcp/localhost/1729' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - alhazen-network

  # ============================================
  # Schema Initialization (runs once)
  # ============================================
  typedb-init:
    image: python:3.11-slim
    container_name: alhazen-typedb-init
    depends_on:
      typedb:
        condition: service_healthy
    volumes:
      - ./local_resources/typedb:/schema:ro
      - ./scripts:/scripts:ro
    networks:
      - alhazen-network
    environment:
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - TYPEDB_DATABASE=alhazen_notebook
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install typedb-driver -q
        python /scripts/db_init.py \
          /schema/alhazen_notebook.tql \
          /schema/namespaces/scilit.tql \
          /schema/namespaces/jobhunt.tql \
          /schema/namespaces/apm.tql \
          /schema/namespaces/techrecon.tql
    restart: "no"

  # ============================================
  # Hub - Master Landing Page
  # ============================================
  hub:
    build:
      context: ./hub
      dockerfile: Dockerfile
    container_name: alhazen-hub
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
    networks:
      - alhazen-network

  # ============================================
  # Job Hunt Dashboard
  # ============================================
  jobhunt-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: alhazen-jobhunt-dashboard
    depends_on:
      typedb:
        condition: service_healthy
    environment:
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - TYPEDB_DATABASE=alhazen_notebook
      - PROJECT_ROOT=/app
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    networks:
      - alhazen-network

volumes:
  typedb-data:
    driver: local

networks:
  alhazen-network:
    driver: bridge
