name: they-said-whaaa
description: "Credibility and consistency tracking for public figures. Captures statements from YouTube and news, extracts claims, detects contradictions, builds position timelines."
license: Apache-2.0
compatibility: "TypeDB 3.x, Python 3.11+"

script: they_said_whaaa.py
schema: schema.tql

requires:
  bins: [uv, docker]
  env: [TYPEDB_HOST, TYPEDB_PORT, TYPEDB_DATABASE]
  optional_env: [ALHAZEN_CACHE_DIR]
  optional_extras: [they-said-whaaa]  # youtube-transcript-api

operations:
  - add-figure
  - list-figures
  - show-figure
  - add-topic
  - list-topics
  - ingest-youtube
  - ingest-article
  - list-sources
  - show-source
  - add-statement
  - add-claim
  - link-topic
  - flag-contradiction
  - list-claims
  - get-timeline
  - list-contradictions
  - compare-figures
  - create-investigation
  - list-investigations

entity_types:
  - tsw-public-figure
  - tsw-topic
  - tsw-investigation
  - tsw-transcript
  - tsw-article
  - tsw-statement
  - tsw-claim

relation_types:
  - tsw-made-statement
  - tsw-about-topic
  - tsw-contradicts
  - tsw-supports
