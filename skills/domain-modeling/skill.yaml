name: domain-modeling
description: "Design and implement domain-specific knowledge skills using the curation pattern"
license: Apache-2.0
compatibility: "Meta-skill for designing other skills - requires understanding of TypeDB and skill architecture"

# Core files
script: domain_modeling.py
schema: schema.tql

# Dependencies
requires:
  bins: [uv, docker]
  env: [TYPEDB_HOST, TYPEDB_PORT, TYPEDB_DATABASE]
  optional_env: []

# Meta-skill pattern
skill_type: meta
purpose: "Teaches how to build domain-specific skills and tracks the design process in TypeDB"

# CLI operations
operations:
  domain_lifecycle:
    - init-domain
    - list-domains
    - show-domain
  schema_snapshots:
    - snapshot-schema
    - list-versions
    - install-hook
  design_decisions:
    - add-decision
    - add-rationale
    - link-gap
    - list-decisions
  experiments:
    - start-experiment
    - record-result
    - complete-experiment
    - list-experiments
  representation_errors:
    - report-error
    - resolve-error
    - list-errors
  export:
    - export-design
  phase_design:
    - define-goal
    - add-evaluation
    - show-goal
    - ingest-design-doc
    - add-entity-schema
    - add-source-schema
    - add-derivation-skill
    - add-analysis-skill
    - add-phase-spec
    - add-phase-gap
    - resolve-phase-gap
    - list-phase-gaps
    - show-phase-item
    - export-design-phases

# TypeDB entity types defined in schema.tql
entity_types:
  - dm-domain          # sub collection: groups all design artifacts for a domain
  - dm-schema-version  # sub artifact: TypeQL schema snapshot with git metadata
  - dm-design-decision # sub domain-thing: a specific schema design choice
  - dm-design-rationale # sub note: Claude's reasoning for a decision
  - dm-experiment      # sub domain-thing: a design hypothesis test
  - dm-experiment-result # sub note: quantitative/qualitative experiment observation
  - dm-representation-error # sub domain-thing: case where schema failed real data
  - dm-goal              # sub domain-thing: system goal (Phase 1)
  - dm-goal-eval         # sub domain-thing: evaluation criterion for a goal
  - dm-entity-schema     # sub domain-thing: TypeDB types defined (Phase 2)
  - dm-source-schema     # sub domain-thing: data sources and artifact types (Phase 3)
  - dm-derivation-skill  # sub domain-thing: ingestion function (Phase 4)
  - dm-analysis-skill    # sub domain-thing: analysis function (Phase 5)
  - dm-phase-spec        # sub note: forward-looking spec (TypeQL, API, function sig)
  - dm-design-gap        # sub domain-thing: missing or unclear design element

# TypeDB relation types defined in schema.tql
relation_types:
  - dm-version-of       # schema-version <-> domain
  - dm-supercedes       # newer-version <-> older-version
  - dm-in-domain        # subject <-> domain (decisions, experiments, errors)
  - dm-decision-in      # decision <-> schema-version (optional version context)
  - dm-rationale-for    # rationale <-> decision
  - dm-tests            # experiment <-> subject (version or decision)
  - dm-result-of        # result <-> experiment
  - dm-error-in         # error <-> schema-version (optional version context)
  - dm-resolved-by      # error <-> resolution (decision)
  - dm-system-goal       # system (domain) <-> goal
  - dm-goal-evaluation   # goal <-> evaluation criterion
  - dm-phase-depends-on  # dependent phase entity <-> dependency
  - dm-phase-artifact    # phase-subject <-> phase-spec or phase-gap

# Curation workflow phases
curation_phases:
  foraging:
    description: "Discovering sources worth capturing"
    examples:
      - "Job boards, company pages (job hunting)"
      - "PubMed, citation chains (literature review)"
      - "RSS feeds, social media (news investigation)"
  
  ingestion:
    description: "Raw capture with provenance"
    properties:
      - provenance
      - immutability
      - completeness
    script_responsibility: "Fetch and store raw content - NO parsing or interpretation"
  
  sensemaking:
    description: "Claude reads and extracts structured understanding"
    subtasks:
      - parsing
      - entity_extraction
      - relation_extraction
      - classification
      - summarization
      - gap_analysis
      - inference
    output: "Fragments, Notes, Relations"
  
  analysis:
    description: "Reasoning across many notes over time"
    examples:
      - "What skills appear most frequently across positions?"
      - "How does this company compare to others?"
    output: "Synthesis notes"
  
  reporting:
    description: "Dashboard views for human decision-making"
    components:
      - pipeline_views
      - comparison_matrices
      - progress_tracking
      - alerts
      - deep_dives

# TypeDB entity mapping
entity_mapping:
  thing: "Primary items you track (Company, Paper, etc.)"
  artifact: "Raw captured content (Job Description, PDF, etc.)"
  fragment: "Extracted pieces (Requirement, Claim, etc.)"
  note: "Claude's analysis (Fit Analysis, Critique, etc.)"

# Design principles
design_principles:
  separation_of_concerns:
    scripts: ["Fetch/store raw content", "Query TypeDB", "Return data for Claude"]
    claude: ["Read artifacts", "Extract entities", "Create notes", "Reason across data"]
  dashboard_design:
    - "Query the graph - don't duplicate data"
    - "Pipeline views - show entities moving through states"
    - "Matrix views - compare across dimensions"
    - "Progress tracking - show plan completion"
    - "Deep dives - all context about an entity"

# When to create new domain
create_when:
  - "Specific information type to track"
  - "Discoverable sources (APIs, URLs, databases)"
  - "Need to reason over time"
  - "Structure matters - entities have attributes/relationships"
  - "Want Claude to build understanding through sensemaking"

dont_create_for:
  - "Simple lookups (use web search)"
  - "One-time questions (just ask)"
  - "Unstructured brainstorming (use notes)"

# Integration with other skills
integrates_with:
  - typedb-notebook