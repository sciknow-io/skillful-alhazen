---
# macOS System Setup (Mac Mini target)

# Ansible SSH sessions get a minimal PATH (/usr/bin:/bin:/usr/sbin:/sbin).
# Docker Desktop symlinks live in /usr/local/bin, Homebrew in /opt/homebrew/bin.
- name: Set macOS PATH for Docker and Homebrew
  set_fact:
    macos_path: "/usr/local/bin:/opt/homebrew/bin:/opt/homebrew/sbin:{{ ansible_env.PATH | default('/usr/bin:/bin:/usr/sbin:/sbin') }}"

- name: Verify Docker Desktop is Running
  command: docker info
  environment:
    PATH: "{{ macos_path }}"
  register: docker_info
  changed_when: false
  failed_when: docker_info.rc != 0
  become: false

- name: Display Docker Info
  debug:
    msg: "Docker Desktop is running: {{ docker_info.stdout_lines[:3] }}"

- name: Check if Homebrew is Installed
  command: which brew
  environment:
    PATH: "{{ macos_path }}"
  register: brew_check
  changed_when: false
  failed_when: false
  become: false

- name: Warn if Homebrew Missing
  debug:
    msg: "WARNING: Homebrew not found. Install from https://brew.sh if you need to install packages."
  when: brew_check.rc != 0

- name: Check if Tailscale is Installed
  command: which tailscale
  environment:
    PATH: "{{ macos_path }}"
  register: tailscale_check
  changed_when: false
  failed_when: false
  become: false

- name: Install Tailscale via Homebrew
  command: brew install --cask tailscale
  environment:
    PATH: "{{ macos_path }}"
  when: tailscale_check.rc != 0 and brew_check.rc == 0
  become: false

- name: Check if docker compose is Available
  command: docker compose version
  environment:
    PATH: "{{ macos_path }}"
  register: compose_check
  changed_when: false
  failed_when: false
  become: false

- name: Fail if docker compose not Available
  fail:
    msg: "docker compose is not available. Ensure Docker Desktop is installed and up to date."
  when: compose_check.rc != 0

# Set macOS Docker environment for openclaw user
- name: Set macOS Docker Environment
  set_fact:
    macos_docker_env:
      PATH: "{{ macos_path }}"
      DOCKER_HOST: "unix:///var/run/docker.sock"

# User Setup (macOS uses dscl instead of useradd)
- name: Check if OpenClaw User Exists
  command: "dscl . -read /Users/{{ openclaw_user }}"
  register: user_check
  changed_when: false
  failed_when: false

- name: Create OpenClaw Home Directory
  file:
    path: "{{ openclaw_home }}"
    state: directory
    owner: "{{ openclaw_user }}"
    mode: '0700'
  when: user_check.rc == 0

- name: Ensure openclaw is in staff Group (for Docker socket access)
  command: "dscl . -append /Groups/staff GroupMembership {{ openclaw_user }}"
  when: user_check.rc == 0
  changed_when: false

- name: Grant openclaw Traverse Access to SSH User Home (for Docker socket)
  command: "chmod +a '{{ openclaw_user }} allow execute' /Users/{{ ansible_user }}"
  when: user_check.rc == 0
  changed_when: false

- name: Create Project Directory (using current user if no dedicated user)
  file:
    path: "{{ docker_dir }}"
    state: directory
    mode: '0700'
  when: user_check.rc != 0

- name: Note about macOS User
  debug:
    msg: >
      macOS user '{{ openclaw_user }}' does not exist. Deployment will use the current user.
      To create a dedicated user, use System Preferences > Users & Groups.
  when: user_check.rc != 0

- name: Verify openclaw Can Access Docker
  shell: /usr/local/bin/docker info 2>&1
  environment: "{{ macos_docker_env }}"
  become: true
  become_user: "{{ openclaw_user }}"
  become_flags: "-H"
  register: openclaw_docker_check
  changed_when: false
  failed_when: false
  when: user_check.rc == 0

- name: Fail if openclaw Cannot Access Docker
  fail:
    msg: |
      The openclaw user cannot access Docker Desktop.
      Error: {{ openclaw_docker_check.stdout | default('') }} {{ openclaw_docker_check.stderr | default('') }}
      Ensure Docker socket is accessible: ls -la /var/run/docker.sock
      The openclaw user must be in the 'staff' group.
  when: user_check.rc == 0 and openclaw_docker_check.rc != 0

- name: Verify SSH is Enabled (Remote Login)
  command: systemsetup -getremotelogin
  register: ssh_status
  changed_when: false
  failed_when: false
  become: true

- name: Display SSH Status
  debug:
    msg: "{{ ssh_status.stdout | default('Could not check SSH status') }}"

- name: Display Tailscale Instruction
  debug:
    msg: "Please ensure Tailscale is running and connected to your tailnet."
