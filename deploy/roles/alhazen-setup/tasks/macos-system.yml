---
# macOS System Setup (Mac Mini target)

# Ansible SSH sessions get a minimal PATH (/usr/bin:/bin:/usr/sbin:/sbin).
# Docker Desktop symlinks live in /usr/local/bin, Homebrew in /opt/homebrew/bin.
- name: Set macOS PATH for Docker and Homebrew
  set_fact:
    macos_path: "/usr/local/bin:/opt/homebrew/bin:/opt/homebrew/sbin:{{ ansible_env.PATH | default('/usr/bin:/bin:/usr/sbin:/sbin') }}"

- name: Verify Docker Desktop is Running
  command: docker info
  environment:
    PATH: "{{ macos_path }}"
  register: docker_info
  changed_when: false
  failed_when: docker_info.rc != 0
  become: false

- name: Display Docker Info
  debug:
    msg: "Docker Desktop is running: {{ docker_info.stdout_lines[:3] }}"

- name: Check if Homebrew is Installed
  command: which brew
  environment:
    PATH: "{{ macos_path }}"
  register: brew_check
  changed_when: false
  failed_when: false
  become: false

- name: Warn if Homebrew Missing
  debug:
    msg: "WARNING: Homebrew not found. Install from https://brew.sh if you need to install packages."
  when: brew_check.rc != 0

- name: Check if Tailscale is Installed
  command: which tailscale
  environment:
    PATH: "{{ macos_path }}"
  register: tailscale_check
  changed_when: false
  failed_when: false
  become: false

- name: Install Tailscale via Homebrew
  command: brew install --cask tailscale
  environment:
    PATH: "{{ macos_path }}"
  when: tailscale_check.rc != 0 and brew_check.rc == 0
  become: false

- name: Check if Node.js is Installed
  command: which node
  environment:
    PATH: "{{ macos_path }}"
  register: node_check
  changed_when: false
  failed_when: false
  become: false

- name: Install Node.js via Homebrew
  command: brew install node
  environment:
    PATH: "{{ macos_path }}"
  when: node_check.rc != 0 and brew_check.rc == 0
  become: false

- name: Check if uv is Installed
  command: which uv
  environment:
    PATH: "{{ macos_path }}"
  register: uv_check
  changed_when: false
  failed_when: false
  become: false

- name: Install uv via Homebrew
  command: brew install uv
  environment:
    PATH: "{{ macos_path }}"
  when: uv_check.rc != 0 and brew_check.rc == 0
  become: false

- name: Check if docker compose is Available
  command: docker compose version
  environment:
    PATH: "{{ macos_path }}"
  register: compose_check
  changed_when: false
  failed_when: false
  become: false

- name: Fail if docker compose not Available
  fail:
    msg: "docker compose is not available. Ensure Docker Desktop is installed and up to date."
  when: compose_check.rc != 0

# Set macOS Docker environment for openclaw user
- name: Set macOS Docker Environment
  set_fact:
    macos_docker_env:
      PATH: "{{ macos_path }}"
      DOCKER_HOST: "unix:///var/run/docker.sock"

# --- User Setup (macOS uses dscl instead of useradd) ---

- name: Check if OpenClaw User Exists
  command: "dscl . -read /Users/{{ openclaw_user }}"
  register: user_check
  changed_when: false
  failed_when: false

# Create user via dscl if it does not exist
- name: Find Next Available UID (macOS)
  shell: |
    max_uid=$(dscl . -list /Users UniqueID | awk '$2 >= 500 {print $2}' | sort -n | tail -1)
    echo $(( ${max_uid:-500} + 1 ))
  register: next_uid
  changed_when: false
  when: user_check.rc != 0

- name: Create OpenClaw User (macOS/dscl)
  shell: |
    dscl . -create /Users/{{ openclaw_user }}
    dscl . -create /Users/{{ openclaw_user }} UserShell /bin/bash
    dscl . -create /Users/{{ openclaw_user }} RealName "OpenClaw + Alhazen Service User"
    dscl . -create /Users/{{ openclaw_user }} UniqueID {{ next_uid.stdout | trim }}
    dscl . -create /Users/{{ openclaw_user }} PrimaryGroupID 20
    dscl . -create /Users/{{ openclaw_user }} NFSHomeDirectory {{ openclaw_home }}
  when: user_check.rc != 0

- name: Create New User Home Directory (macOS)
  file:
    path: "{{ openclaw_home }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: staff
    mode: '0755'
  when: user_check.rc != 0

- name: Populate Home Directory Defaults (macOS)
  command: createhomedir -c -u {{ openclaw_user }}
  when: user_check.rc != 0
  failed_when: false

# Ensure home directory exists with correct permissions (idempotent)
# 0755: gullyburns (Docker user) needs read+execute to traverse and for getcwd to work
- name: Ensure OpenClaw Home Directory Exists
  file:
    path: "{{ openclaw_home }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: staff
    mode: '0755'

# SSH Key Deployment (mirrors linux-system.yml pattern)
- name: Setup OpenClaw .ssh Directory (macOS)
  file:
    path: "{{ openclaw_home }}/.ssh"
    state: directory
    owner: "{{ openclaw_user }}"
    group: staff
    mode: '0700'

- name: Authorize SSH Key for OpenClaw User (macOS)
  authorized_key:
    user: "{{ openclaw_user }}"
    state: present
    key: "{{ deploy_public_key }}"

# Group membership (staff group for shared resources)
- name: Ensure openclaw is in staff Group
  command: "dscl . -append /Groups/staff GroupMembership {{ openclaw_user }}"
  changed_when: false

- name: Verify SSH is Enabled (Remote Login)
  command: systemsetup -getremotelogin
  register: ssh_status
  changed_when: false
  failed_when: false
  become: true

- name: Display SSH Status
  debug:
    msg: "{{ ssh_status.stdout | default('Could not check SSH status') }}"

- name: Display Tailscale Instruction
  debug:
    msg: "Please ensure Tailscale is running and connected to your tailnet."
