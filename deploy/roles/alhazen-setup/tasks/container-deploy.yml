---
# Combined OpenClaw + Alhazen Container Stack Deployment

- name: Set container tool facts
  set_fact:
    compose_cmd: "{{ 'docker compose' if target_type == 'macmini' else 'podman-compose' }}"
    container_cmd: "{{ 'docker' if target_type == 'macmini' else 'podman' }}"

- name: Set SSH user fact (macOS compose runs as SSH user, not openclaw)
  set_fact:
    compose_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  when: target_type == 'macmini'

# Linux: Get UID for rootless Podman
- name: Get OpenClaw User UID (Linux)
  getent:
    database: passwd
    key: "{{ openclaw_user }}"
  when: target_type == 'vps'

# Directory Structure — all dirs are 0700 (openclaw runs everything)
- name: Create Docker Directory Structure
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ docker_dir }}", mode: "0700" }
    - { path: "{{ data_dir }}", mode: "0700" }
    - { path: "{{ ssh_dir }}", mode: "0700" }
    - { path: "{{ workspace_dir }}", mode: "0700" }
    - { path: "{{ docker_dir }}/typedb-data", mode: "0700" }

- name: Fix Workspace Permissions (Must be readable)
  file:
    path: "{{ workspace_dir }}"
    mode: '0755'

# Clone Source Repository (needed for container builds and schemas)
- name: Clone Alhazen Repository (Linux)
  git:
    repo: "https://github.com/GullyBurns/skillful-alhazen.git"
    dest: "{{ repo_dir }}"
    version: "{{ deploy_branch | default('main') }}"
    update: yes
  become: true
  become_user: "{{ openclaw_user }}"
  when: target_type == 'vps'

- name: Clone Alhazen Repository (macOS)
  git:
    repo: "https://github.com/GullyBurns/skillful-alhazen.git"
    dest: "{{ repo_dir }}"
    version: "{{ deploy_branch | default('main') }}"
    update: yes
  become: true
  become_user: "{{ openclaw_user }}"
  when: target_type == 'macmini'

- name: Ensure Repo is World-Readable for Docker Builds (macOS)
  shell: chmod -R a+rX {{ repo_dir }}
  when: target_type == 'macmini'

# Reset Podman namespace ownership before writing (fixes re-deploy permission errors)
- name: Reset Workspace Ownership for Host Access (Linux)
  shell: |
    podman unshare chown -R 0:0 {{ workspace_dir }}
    podman unshare chown -R 0:0 {{ data_dir }}
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
  when: target_type == 'vps'
  ignore_errors: true

# Resolve skills from skills-registry.yaml into local_skills/ on the remote
# (path: entries → symlinks to skills/; git: entries → cloned from registry)
- name: Resolve skills from skills-registry.yaml into local_skills/
  shell: |
    python3 - << 'PYEOF'
    import subprocess, sys, shutil
    from pathlib import Path
    try:
        import yaml
    except ImportError:
        print("PyYAML not available — skipping skill resolution"); sys.exit(0)
    registry = Path('skills-registry.yaml')
    if not registry.exists():
        print("No skills-registry.yaml found"); sys.exit(0)
    cfg = yaml.safe_load(registry.read_text()) or {}
    local_skills = Path('local_skills'); local_skills.mkdir(exist_ok=True)
    for skill in cfg.get('skills') or []:
        name = skill['name']
        target = local_skills / name
        if 'path' in skill:
            src = Path(skill['path'])
            if target.is_symlink(): target.unlink()
            elif target.exists(): shutil.rmtree(str(target))
            target.symlink_to(f'../{src}')
            print(f'  Linked (core): {name}')
            continue
        git_url = skill['git']
        ref = skill.get('ref', 'main'); subdir = skill.get('subdir', '.')
        if target.exists() and not target.is_symlink():
            print(f'  Skipping {name} (already installed)')
            continue
        if target.is_symlink(): target.unlink()
        print(f'  Cloning {name}...')
        tmp = local_skills / f'_tmp_{name}'
        try:
            subprocess.run(['git','clone','--depth=1','--branch',ref,git_url,str(tmp)],
                           check=True, capture_output=True)
            src = tmp / subdir if subdir != '.' else tmp
            src.rename(target)
            print(f'  Installed {name}')
        except subprocess.CalledProcessError as e:
            print(f'  Failed {name}: {e}', file=sys.stderr)
        finally:
            if tmp.exists(): shutil.rmtree(str(tmp), ignore_errors=True)
    PYEOF
  args:
    chdir: "{{ repo_dir }}"
  become: true
  become_user: "{{ openclaw_user }}"

# Copy all resolved skills (core + external) into OpenClaw managed skills directory
# OpenClaw discovers custom skills from ~/.openclaw/skills/ (managedSkillsDir),
# which maps to openclaw-data/skills/ on the host via the docker-compose volume mount.
# -L follows symlinks so core skills (local_skills/typedb-notebook → ../skills/typedb-notebook)
# are copied as real directories.
- name: Copy Alhazen Skills to Managed Skills Dir
  shell: |
    mkdir -p {{ data_dir }}/skills
    for skill_dir in {{ repo_dir }}/local_skills/*/; do
      [ -d "$skill_dir" ] || continue
      skill_name=$(basename "$skill_dir")
      cp -rL "$skill_dir" "{{ data_dir }}/skills/$skill_name"
    done
  become: true
  become_user: "{{ openclaw_user }}"

# Copy identity files to workspace (matching make deploy-openclaw-identity)
- name: Copy SOUL.md to Workspace
  copy:
    src: "{{ repo_dir }}/local_resources/openclaw/SOUL.md"
    dest: "{{ workspace_dir }}/SOUL.md"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'
    remote_src: true

- name: Copy AGENTS.md to Workspace
  copy:
    src: "{{ repo_dir }}/local_resources/openclaw/AGENTS.md"
    dest: "{{ workspace_dir }}/AGENTS.md"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'
    remote_src: true

- name: Copy Identity Templates to Workspace
  copy:
    src: "{{ repo_dir }}/local_resources/openclaw/{{ item }}"
    dest: "{{ workspace_dir }}/{{ item | replace('.template', '') }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'
    remote_src: true
    force: false
  loop:
    - HEARTBEAT.md.template
    - MEMORY.md.template
    - TOOLS.md.template
    - USER.md.template
  ignore_errors: true

# Copy CLAUDE.md to workspace (matching make deploy-openclaw-docs)
- name: Copy CLAUDE.md to Workspace
  copy:
    src: "{{ repo_dir }}/CLAUDE.md"
    dest: "{{ workspace_dir }}/CLAUDE.md"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'
    remote_src: true

# Copy pyproject.toml and uv.lock so skill scripts can resolve dependencies via `uv run`
- name: Copy pyproject.toml to Workspace
  copy:
    src: "{{ repo_dir }}/pyproject.toml"
    dest: "{{ workspace_dir }}/pyproject.toml"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'
    remote_src: true

- name: Copy uv.lock to Workspace
  copy:
    src: "{{ repo_dir }}/uv.lock"
    dest: "{{ workspace_dir }}/uv.lock"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'
    remote_src: true

# Secrets Management
- name: Check for existing secrets in .env
  slurp:
    src: "{{ docker_dir }}/.env"
  register: existing_env_file
  ignore_errors: true

- name: Extract Existing LiteLLM Master Key
  set_fact:
    existing_master_key: "{{ (existing_env_file.content | b64decode | regex_findall('LITELLM_MASTER_KEY=(.*)'))[0] | default('') }}"
  when: not existing_env_file.failed

- name: Extract Existing Gateway Token
  set_fact:
    existing_openclaw_token: "{{ (existing_env_file.content | b64decode | regex_findall('OPENCLAW_GATEWAY_TOKEN=(.*)'))[0] | default('') }}"
  when: not existing_env_file.failed

- name: Generate LiteLLM Master Key (if missing)
  command: "openssl rand -base64 32"
  register: litellm_master_key_gen
  when: existing_master_key | default('') | length == 0

- name: Generate OpenClaw Gateway Token (if missing)
  command: "openssl rand -base64 32"
  register: openclaw_token_gen
  when: existing_openclaw_token | default('') | length == 0

- name: Set Final Secrets
  set_fact:
    litellm_key: "{{ existing_master_key | default('') if (existing_master_key | default('') | length > 0) else litellm_master_key_gen.stdout }}"
    openclaw_token: "{{ existing_openclaw_token | default('') if (existing_openclaw_token | default('') | length > 0) else openclaw_token_gen.stdout }}"

# Render All Config Templates
- name: Create .env file for Compose
  template:
    src: env.j2
    dest: "{{ docker_dir }}/.env"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

- name: Create LiteLLM env file (real API keys - LiteLLM only)
  template:
    src: litellm.env.j2
    dest: "{{ docker_dir }}/litellm.env"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

- name: Create LiteLLM Config
  template:
    src: litellm-config.yaml.j2
    dest: "{{ docker_dir }}/litellm-config.yaml"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

- name: Prepare OpenClaw Config Directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0700'
  loop:
    - "{{ data_dir }}/credentials"

- name: Create OpenClaw Consolidated Config
  template:
    src: openclaw.json.j2
    dest: "{{ data_dir }}/openclaw.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

- name: Create Hardened Tools Allowlist
  template:
    src: tools.yaml.j2
    dest: "{{ data_dir }}/tools.yaml"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

- name: Create Secure MCP Config
  template:
    src: mcp.json.j2
    dest: "{{ data_dir }}/mcp.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

- name: Create Exec Approvals Config
  template:
    src: exec-approvals.json.j2
    dest: "{{ data_dir }}/exec-approvals.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

# Generate dynamic skill entries in OpenClaw config
- name: Generate Alhazen Skill Entries in OpenClaw Config
  shell: |
    patch='{}'
    for skill_dir in {{ repo_dir }}/local_skills/*/; do
      [ -d "$skill_dir" ] || continue
      skill_name=$(basename "$skill_dir")
      patch=$(echo "$patch" | jq --arg name "$skill_name" \
        --arg root "/opt/openclaw/workspace" \
        --arg typedb_host "typedb" \
        --arg typedb_port "1729" \
        --arg typedb_db "alhazen_notebook" \
        '. + {($name): {"env": {"ALHAZEN_PROJECT_ROOT": $root, "TYPEDB_HOST": $typedb_host, "TYPEDB_PORT": $typedb_port, "TYPEDB_DATABASE": $typedb_db}}}')
    done
    jq --argjson entries "$patch" '.skills.entries = $entries' \
      "{{ data_dir }}/openclaw.json" > "{{ data_dir }}/openclaw.json.tmp" && \
      mv "{{ data_dir }}/openclaw.json.tmp" "{{ data_dir }}/openclaw.json"
  become: true
  become_user: "{{ openclaw_user }}"

- name: Add Heartbeat Config to OpenClaw
  shell: |
    if ! jq -e '.agents.defaults.heartbeat' "{{ data_dir }}/openclaw.json" >/dev/null 2>&1; then
      jq '.agents.defaults.heartbeat = {"every": "2h", "target": "last", "activeHours": {"start": "08:00", "end": "22:00", "timezone": "America/Los_Angeles"}}' \
        "{{ data_dir }}/openclaw.json" > "{{ data_dir }}/openclaw.json.tmp" && \
        mv "{{ data_dir }}/openclaw.json.tmp" "{{ data_dir }}/openclaw.json"
    fi
  become: true
  become_user: "{{ openclaw_user }}"

- name: Create Squid Allowlist
  template:
    src: allowlist.txt.j2
    dest: "{{ docker_dir }}/allowlist.txt"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'

- name: Create Squid Config
  template:
    src: squid.conf.j2
    dest: "{{ docker_dir }}/squid.conf"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

- name: Create SearXNG Config Directory
  file:
    path: "{{ docker_dir }}/searxng"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0755'

- name: Generate SearXNG Secret Key
  command: "openssl rand -hex 32"
  register: searxng_secret_gen

- name: Set SearXNG Secret
  set_fact:
    searxng_secret: "{{ searxng_secret_gen.stdout }}"

- name: Create SearXNG Settings
  template:
    src: searxng-settings.yml.j2
    dest: "{{ docker_dir }}/searxng/settings.yml"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'

# SSL Certificates
- name: Deploy SSL Certificate
  copy:
    content: "{{ hostvars['localhost']['deploy_ssl_cert'] }}"
    dest: "{{ data_dir }}/gateway.crt"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'

- name: Deploy SSL Key
  copy:
    content: "{{ hostvars['localhost']['deploy_ssl_key'] }}"
    dest: "{{ data_dir }}/gateway.key"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

# Monitoring
- name: Deploy Monitoring Script
  template:
    src: monitor.sh.j2
    dest: "{{ docker_dir }}/monitor.sh"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0700'

# Docker Compose & Dockerfile
# openclaw-build/ is a minimal build context containing only the Dockerfile.
# This avoids Docker's buildkit walking docker_dir (which contains 0600 secrets)
# to read xattrs — buildkit scans ALL files in the context dir before applying
# .dockerignore, so secrets must be physically absent from the context.
- name: Create OpenClaw Minimal Build Context Directory
  file:
    path: "{{ docker_dir }}/openclaw-build"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0755'

- name: Create OpenClaw Dockerfile
  template:
    src: Dockerfile.j2
    dest: "{{ docker_dir }}/openclaw-build/Dockerfile"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0644'

- name: Deploy Docker Compose Stack
  template:
    src: docker-compose.yml.j2
    dest: "{{ docker_dir }}/docker-compose.yml"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0600'

# Linux: Podman user namespace setup
- name: Set Podman User Namespace Permissions
  command: "podman unshare chown -R 1000:1000 {{ item }}"
  loop:
    - "{{ data_dir }}"
    - "{{ ssh_dir }}"
    - "{{ workspace_dir }}"
    - "{{ docker_dir }}/typedb-data"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
  when: target_type == 'vps'

- name: Fix Base Directory Permissions
  file:
    path: "{{ docker_dir }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group | default(openclaw_user) }}"
    mode: '0700'

# Linux: Monitoring systemd timer
- name: Create Monitoring systemd Service (Linux)
  copy:
    dest: /etc/systemd/system/openclaw-monitor.service
    content: |
      [Unit]
      Description=OpenClaw + Alhazen Security Monitor
      After=podman.service

      [Service]
      Type=oneshot
      ExecStart={{ docker_dir }}/monitor.sh
      User=root
  when: target_type == 'vps'

- name: Create Monitoring systemd Timer (Linux)
  copy:
    dest: /etc/systemd/system/openclaw-monitor.timer
    content: |
      [Unit]
      Description=Run Security Monitor Weekly

      [Timer]
      OnCalendar=weekly
      Persistent=true

      [Install]
      WantedBy=timers.target
  when: target_type == 'vps'

- name: Enable Monitoring Timer (Linux)
  systemd:
    name: openclaw-monitor.timer
    state: started
    enabled: true
    daemon_reload: true
  when: target_type == 'vps'

# macOS: Monitoring via launchd
- name: Create Monitoring launchd plist (macOS)
  copy:
    dest: /Library/LaunchDaemons/com.openclaw.monitor.plist
    owner: root
    group: wheel
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>Label</key>
          <string>com.openclaw.monitor</string>
          <key>ProgramArguments</key>
          <array>
              <string>{{ docker_dir }}/monitor.sh</string>
          </array>
          <key>StartCalendarInterval</key>
          <dict>
              <key>Weekday</key>
              <integer>1</integer>
              <key>Hour</key>
              <integer>3</integer>
          </dict>
      </dict>
      </plist>
  when: target_type == 'macmini'

# macOS: gullyburns runs docker compose, so it needs to enter docker_dir and read
# compose files. Secret data files (openclaw-data/) stay 0600 (openclaw only).
- name: Fix Docker Dir Permissions for SSH User Access (macOS)
  shell: |
    chmod 755 {{ docker_dir }}
    chmod 644 {{ docker_dir }}/docker-compose.yml
    chmod 644 {{ docker_dir }}/Dockerfile
    chmod 755 {{ docker_dir }}/monitor.sh
    chmod 640 {{ docker_dir }}/.env
    chmod 640 {{ docker_dir }}/litellm.env
    chmod 644 {{ docker_dir }}/litellm-config.yaml
    chmod 644 {{ docker_dir }}/squid.conf
    chmod 644 {{ docker_dir }}/allowlist.txt
  when: target_type == 'macmini'

# Stop existing stack
- name: Stop Existing Stack (Linux/Podman)
  shell: |
    podman-compose down
  args:
    chdir: "{{ docker_dir }}"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
  ignore_errors: true
  when: target_type == 'vps'

- name: Stop Existing Stack (macOS/Docker)
  shell: |
    docker compose down
  args:
    chdir: "{{ docker_dir }}"
  become: false
  environment: "{{ macos_docker_env }}"
  ignore_errors: true
  when: target_type == 'macmini'

# Build and start
- name: Build Container Images (Linux/Podman)
  shell: |
    podman-compose build --no-cache 2>&1
  args:
    chdir: "{{ docker_dir }}"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
  register: build_result_linux
  async: 1800
  poll: 30
  when: target_type == 'vps'

- name: Build Container Images (macOS/Docker)
  shell: |
    docker compose build 2>&1
  args:
    chdir: "{{ docker_dir }}"
  become: false
  environment: "{{ macos_docker_env }}"
  register: build_result_macos
  async: 1800
  poll: 30
  when: target_type == 'macmini'

- name: Start Stack (Linux/Podman)
  shell: |
    podman-compose up -d
    # Force restart agent to ensure config pick-up
    podman restart {{ container_prefix | default('openclaw') }}-agent
  args:
    chdir: "{{ docker_dir }}"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}/bus"
    LITELLM_MASTER_KEY: "{{ litellm_key }}"
    OPENCLAW_GATEWAY_TOKEN: "{{ openclaw_token }}"
  register: start_result_linux
  when: target_type == 'vps'

- name: Start Stack (macOS/Docker)
  shell: |
    docker compose up -d
    docker restart {{ container_prefix | default('openclaw') }}-agent
  args:
    chdir: "{{ docker_dir }}"
  become: false
  environment:
    PATH: "{{ macos_docker_env.PATH }}"
    DOCKER_HOST: "{{ macos_docker_env.DOCKER_HOST }}"
    LITELLM_MASTER_KEY: "{{ litellm_key }}"
    OPENCLAW_GATEWAY_TOKEN: "{{ openclaw_token }}"
  register: start_result_macos
  when: target_type == 'macmini'

# Run OpenClaw Doctor Fix
- name: Run OpenClaw Doctor Fix (Linux/Podman)
  shell: |
    {{ container_cmd }} exec {{ container_prefix | default('openclaw') }}-agent openclaw doctor --fix --yes --non-interactive
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
  ignore_errors: true
  when: target_type == 'vps'

- name: Run OpenClaw Doctor Fix (macOS/Docker)
  shell: |
    {{ container_cmd }} exec {{ container_prefix | default('openclaw') }}-agent openclaw doctor --fix --yes --non-interactive
  become: false
  environment: "{{ macos_docker_env }}"
  ignore_errors: true
  when: target_type == 'macmini'

# Health check: wait for TypeDB (uses bash /dev/tcp — TypeDB 3.x has no bundled console)
- name: Wait for TypeDB to be Ready (Linux/Podman)
  shell: |
    for i in $(seq 1 30); do
      {{ container_cmd }} exec {{ container_prefix | default('alhazen') }}-typedb bash -c 'timeout 2 bash -c "echo > /dev/tcp/localhost/1729"' 2>/dev/null && exit 0
      sleep 2
    done
    echo "TypeDB failed to start within 60 seconds" && exit 1
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
  register: typedb_health_linux
  when: target_type == 'vps'

- name: Wait for TypeDB to be Ready (macOS/Docker)
  shell: |
    for i in $(seq 1 30); do
      {{ container_cmd }} exec {{ container_prefix | default('alhazen') }}-typedb bash -c 'timeout 2 bash -c "echo > /dev/tcp/localhost/1729"' 2>/dev/null && exit 0
      sleep 2
    done
    echo "TypeDB failed to start within 60 seconds" && exit 1
  become: false
  environment: "{{ macos_docker_env }}"
  register: typedb_health_macos
  when: target_type == 'macmini'

- name: Show TypeDB Health
  debug:
    msg: "TypeDB health check: {{ 'PASSED' if (typedb_health_linux.rc | default(typedb_health_macos.rc | default(1))) | int == 0 else 'FAILED' }}"

# List containers
- name: List All Containers (Linux/Podman)
  shell: "{{ container_cmd }} ps -a"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
  register: container_ps_linux
  when: target_type == 'vps'

- name: List All Containers (macOS/Docker)
  shell: "{{ container_cmd }} ps -a"
  become: false
  environment: "{{ macos_docker_env }}"
  register: container_ps_macos
  when: target_type == 'macmini'

- name: Show Container Status
  debug:
    msg: "{{ (container_ps_linux.stdout_lines | default(container_ps_macos.stdout_lines | default([]))) }}"

# Ensure persistence
- name: Ensure Containers Persist on Reboot (Linux)
  command: "loginctl enable-linger {{ openclaw_user }}"
  when: target_type == 'vps'
