---
- name: Update Squid Allowlist
  hosts: all
  become: true
  vars:
    openclaw_user: "openclaw"
    openclaw_home: "{{ '/Users/openclaw' if target_type == 'macmini' else '/home/openclaw' }}"
    compose_project_name: "{{ compose_project_name | default('openclaw-docker') }}"
    docker_dir: "{{ openclaw_home }}/{{ compose_project_name }}"
    target_type: "{{ target_type | default('vps') }}"
    container_prefix: "{{ container_prefix | default('alhazen') }}"

  tasks:
    - name: Update Allowlist File
      template:
        src: roles/alhazen-setup/templates/allowlist.txt.j2
        dest: "{{ docker_dir }}/allowlist.txt"
        owner: "{{ openclaw_user }}"
        group: "{{ 'staff' if target_type == 'macmini' else openclaw_user }}"
        mode: '0644'
      register: allowlist_update

    # Linux (Podman) reload
    - name: Get OpenClaw User UID (Linux)
      getent:
        database: passwd
        key: "{{ openclaw_user }}"
      when: allowlist_update.changed and target_type == 'vps'

    - name: Reload Squid Configuration (Linux/Podman)
      shell: |
        podman exec {{ container_prefix | default('openclaw') }}-squid squid -k reconfigure
      become_user: "{{ openclaw_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][openclaw_user][1] }}"
      when: allowlist_update.changed and target_type == 'vps'

    # macOS (Docker) reload
    - name: Reload Squid Configuration (macOS/Docker)
      shell: |
        docker exec {{ container_prefix | default('openclaw') }}-squid squid -k reconfigure
      environment:
        PATH: "/usr/local/bin:/opt/homebrew/bin:{{ ansible_env.PATH | default('/usr/bin:/bin:/usr/sbin:/sbin') }}"
      when: allowlist_update.changed and target_type == 'macmini'

    - name: Status Message
      debug:
        msg: "{{ 'Allowlist updated and Squid reloaded.' if allowlist_update.changed else 'No changes to allowlist.' }}"
